name: Deploy Demo to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'demo-index/**'
      - 'demos/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build all demos
        run: |
          mkdir -p dist

          # 一覧ページをルートに配置
          cp demo-index/index.html dist/index.html

          # vite.config.ts があるディレクトリだけビルド
          for demo_dir in demos/*/; do
            if [ ! -f "${demo_dir}vite.config.ts" ]; then
              continue
            fi
            demo_name=$(basename "$demo_dir")
            echo "Building: $demo_name"
            cd "$demo_dir"
            npm install
            npm run build
            cd ../..
            mv "demos/${demo_name}/dist" "dist/${demo_name}"
          done

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - uses: actions/deploy-pages@v4
        id: deployment
